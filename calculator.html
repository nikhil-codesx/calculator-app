<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium Calculator</title>
<style>
:root{
  --violet:#7f00ff;
  --pink:#e100ff;
  --bg:#07070c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  overflow:hidden;
}

/* Animated gradient glow */
body::before{
  content:"";
  position:fixed;inset:-50%;
  background:radial-gradient(closest-side, rgba(127,0,255,.25), transparent 60%),
             radial-gradient(closest-side, rgba(225,0,255,.25), transparent 60%);
  animation:move 10s linear infinite alternate;
  z-index:-1;
}
@keyframes move{
  from{transform:translate(-10%, -10%)}
  to{transform:translate(10%, 10%)}
}

.calculator{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 0 60px rgba(127,0,255,.35);
  transform-style:preserve-3d;
  animation:float 5s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.display{
  width:100%;height:70px;border:none;border-radius:14px;
  margin-bottom:16px;padding:12px 14px;
  font-size:26px;text-align:right;
  background:#0f1020;color:#fff;
  box-shadow:inset 0 0 15px rgba(0,0,0,.6);
  letter-spacing:.5px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,72px);
  gap:12px;
}

button{
  height:64px;border:none;border-radius:18px;
  font-size:18px;cursor:pointer;color:#fff;
  background:#15162b;
  transition:.18s ease;
  position:relative;overflow:hidden;
}

/* ripple effect */
button::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle, rgba(255,255,255,.35) 10%, transparent 11%) center/0% 0% no-repeat;
  transition:background-size .4s ease;
}
button:active::after{background-size:200% 200%;}

button:hover{
  transform:translateY(-4px) scale(1.04);
  background:linear-gradient(135deg,var(--violet),var(--pink));
  box-shadow:0 10px 25px rgba(127,0,255,.5);
}

.equal{
  background:linear-gradient(135deg,var(--violet),var(--pink));
  box-shadow:0 10px 25px rgba(127,0,255,.6);
}

/* neon pulse for equals */
.equal{
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 10px var(--violet)}
  50%{box-shadow:0 0 30px var(--pink)}
}

/* subtle tilt with mouse */
.calculator:hover{
  transform:rotateX(6deg) rotateY(-6deg);
}

/* footer hint */
.hint{position:fixed;bottom:10px;color:#777;font-size:12px}
</style>
</head>
<body>

<div class="calculator" id="calc">
  <input type="text" class="display" id="display" disabled>
  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('0')">0</button>
  </div>
</div>

<div class="hint">Tip: Keyboard support enabled ⌨️</div>

<script>
const display = document.getElementById('display');

function append(v){ display.value += v; }
function clearDisplay(){ display.value = ''; }
function calculate(){
  try{ display.value = eval(display.value); }
  catch{ display.value = 'Error'; setTimeout(()=>display.value='',1200); }
}

// keyboard support
window.addEventListener('keydown',(e)=>{
  if((e.key>='0'&&e.key<='9')||['+','-','*','/','.'].includes(e.key)) append(e.key);
  if(e.key==='Enter') calculate();
  if(e.key==='Backspace') display.value = display.value.slice(0,-1);
  if(e.key==='Escape') clearDisplay();
});

// parallax tilt based on mouse
const calc = document.getElementById('calc');
calc.addEventListener('mousemove',(e)=>{
  const rect = calc.getBoundingClientRect();
  const x = (e.clientX - rect.left)/rect.width - .5;
  const y = (e.clientY - rect.top)/rect.height - .5;
  calc.style.transform = `rotateX(${(-y*8).toFixed(2)}deg) rotateY(${(x*8).toFixed(2)}deg)`;
});
calc.addEventListener('mouseleave',()=>{ calc.style.transform = 'rotateX(0) rotateY(0)'; });
</script>

</body>
</html>
